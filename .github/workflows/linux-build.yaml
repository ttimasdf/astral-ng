name: 🐧 构建 Linux 应用

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # 当推送版本标签时触发

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
    
    env:
      FLUTTER_VERSION: main
      FLUTTER_CHANNEL: main
      RUST_VERSION: 1.89.0

    steps:
      - name: 🛠️ 检出代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: 🦀 设置 Rust 工具链 ${{ env.RUST_VERSION }}
        run: |
          chmod +x $GITHUB_WORKSPACE/scripts/install_rust.sh
          $GITHUB_WORKSPACE/scripts/install_rust.sh

      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build libgtk-3-dev
          sudo apt-get install -y clang cmake pkg-config libcurl4-openssl-dev
          sudo apt-get install -y protobuf-compiler
          # 只安装 ayatana 版本的依赖
          sudo apt-get install -y libayatana-appindicator3-dev
          # 移除冲突的包
          # sudo apt-get install -y libappindicator3-dev
          # 添加 patchelf
          sudo apt-get install -y patchelf
          sudo apt-get install -y ruby-dev
          sudo gem install --no-document fpm
          sudo apt-get install -y fuse libfuse2

      - name: 🐦 安装 Flutter
        run: |
          chmod +x $GITHUB_WORKSPACE/scripts/install_flutter.sh
          $GITHUB_WORKSPACE/scripts/install_flutter.sh

      - name: 🎯 启用 Linux 桌面支持
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux .

      - name: 📚 安装 Flutter 依赖
        run: |
          flutter pub get

      - name: 🛠️ 构建 Linux 应用
        run: |
          flutter build linux --release

      - name: 📦 打包应用
        run: |
          set -e
          mkdir -p release
          BUNDLE=build/linux/x64/release/bundle
          cd "$BUNDLE"
          patchelf astral --add-needed libisar.so --add-needed librust_lib_astral.so
          tar -czf $GITHUB_WORKSPACE/release/astral-linux-x64.tar.gz *
          echo "打包完成，检查文件大小："
          ls -lh $GITHUB_WORKSPACE/release/

      - name: 📂 准备打包目录
        run: |
          set -e
          BUNDLE=$GITHUB_WORKSPACE/build/linux/x64/release/bundle
          STAGING=$GITHUB_WORKSPACE/build/linux/pkgroot
          rm -rf "$STAGING"
          mkdir -p "$STAGING/opt/astral"
          cp -a "$BUNDLE/." "$STAGING/opt/astral/"
          install -Dm755 linux/packaging/astral-cli.sh "$STAGING/usr/bin/astral"
          install -Dm644 linux/packaging/astral.desktop "$STAGING/usr/share/applications/astral.desktop"
          install -Dm644 assets/logo.png "$STAGING/usr/share/pixmaps/astral.png"
          find "$STAGING" -maxdepth 3 -type f

      - name: 📦 打包 deb 包
        run: |
          set -e
          mkdir -p release
          STAGING=$GITHUB_WORKSPACE/build/linux/pkgroot
          fpm -s dir -t deb -n astral -v 1.0.0 -a amd64 -C "$STAGING" .
          mv *.deb $GITHUB_WORKSPACE/release/astral-linux-x64.deb

      - name: 📦 打包 rpm 包
        run: |
          set -e
          STAGING=$GITHUB_WORKSPACE/build/linux/pkgroot
          fpm -s dir -t rpm -n astral -v 1.0.0 -a amd64 -C "$STAGING" .
          mv *.rpm $GITHUB_WORKSPACE/release/astral-linux-x64.rpm

      - name: 📤 上传所有 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: astral-linux-x64-all
          path: |
            release/astral-linux-x64.tar.gz
            release/astral-linux-x64.deb
            release/astral-linux-x64.rpm
          retention-days: 7
